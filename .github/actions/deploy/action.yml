name: Deploy
description: deploy with PM2.

inputs:
  environment:
    description: Deployment environment name.
    required: true
  port:
    description: Port to start the service on.
    required: true
  repo-path:
    description: Local folder where python-greetings will be checked out.
    required: true

runs:
  using: composite
  steps:
    - name: Print stage info
      shell: cmd
      run: echo "Deploying application to ${{ inputs.environment }}..."

    - name: Checkout python-greetings repository
      uses: actions/checkout@v6
      with:
        repository: mtararujs/python-greetings
        path: ${{ inputs.repo-path }}

    - name: Create virtual environment
      shell: cmd
      working-directory: ${{ inputs.repo-path }}
      run: |
        echo "Preparing Python environment for deployment..."
        py -m venv venv
        venv\\Scripts\\python -m pip install -r requirements.txt

    - name: Verify PM2 installation
      shell: cmd
      run: |
        echo "Checking PM2 availability..."
        pm2 --version

    - name: Stop old service if it exists
      shell: cmd
      working-directory: ${{ inputs.repo-path }}
      run: |
        echo "Stopping old greetings-app-${{ inputs.environment }} service if it exists..."
        pm2 delete greetings-app-${{ inputs.environment }} || exit 0

    - name: Start service with PM2
      shell: cmd
      working-directory: ${{ inputs.repo-path }}
      run: |
        echo "Starting greetings-app-${{ inputs.environment }} on port ${{ inputs.port }}..."
        pm2 start app.py --name greetings-app-${{ inputs.environment }} --interpreter '%CD%\\venv\\Scripts\\pythonw.exe' -- --port ${{ inputs.port }}
        pm2 list
