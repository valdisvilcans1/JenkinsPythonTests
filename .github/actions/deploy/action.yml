name: deploy
description: Deploy python greetings

inputs:
  repo-path:
    required: true
    description: Directory for python greetings
  environment:
    required: true
    description: Environment
  port:
    required: true
    description: Port number

runs:
  using: composite
  steps:
    - name: Delete old connection
      shell: cmd
      working-directory: ${{ inputs.repo-path }}
      run: |
        echo Deleting old connection..
        pm2 delete greetings-app-${{ inputs.environment }} || exit 0

    - name: Start new connection
      shell: cmd
      working-directory: ${{ inputs.repo-path }}
      run: |
        echo Starting new connection..
        dir
        pm2 start -n greetings-app-${{ inputs.environment }} app.py --interpreter "%CD%\venv\Scripts\pythonw.exe" -- --port ${{ inputs.port }}
