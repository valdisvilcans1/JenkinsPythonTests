name: deploy
description: Deploy python greetings

inputs:
  repo-path:
    required: true
    description: Directory for python greetings
  environment:
    required: true
    description: Environment
  port:
    required: true
    description: Port number

runs:
  using: composite
  steps:
    - name: Checkout python-greetings repository
      uses: actions/checkout@v6
      with:
        repository: mtararujs/python-greetings
        path: ${{ inputs.repo-path }}

    - name: Delete old connection
      shell: cmd
      run: |
        echo Deleting old connection..
        pm2 delete greetings-app-${{ inputs.environment }} || exit 0

    - name: Start new connection
      shell: cmd
      run: |
        echo Starting new connection..
        dir ${{ inputs.environment }}
        pm2 start -n greetings-app-${{ inputs.environment }} ${{ inputs.repo-path }}/app.py --interpreter ".\${{ inputs.repo-path }}\venv\Scripts\pythonw.exe" -- --port ${{ inputs.port }}
