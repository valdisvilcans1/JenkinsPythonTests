name: Install pip dependencies
description: Clone python greetings

inputs:
  repo-path:
    description: Local folder where python-greetings will be checked out.
    required: true

runs:
  using: composite
  steps:
    - name: Print stage info
      shell: bat
      run: echo "Installing all required dependencies..."

    - name: Checkout python-greetings repository
      uses: actions/checkout@v6
      with:
        repository: mtararujs/python-greetings
        path: ${{ inputs.repo-path }}

    - name: Show cloned files
      shell: bat
      working-directory: ${{ inputs.repo-path }}
      run: dir

    - name: Create virtual environment
      shell: bat
      working-directory: ${{ inputs.repo-path }}
      run: |
        echo "Creating Python virtual environment..."
        py -m venv venv

    - name: Install Python packages
      shell: bat
      working-directory: ${{ inputs.repo-path }}
      run: |
        echo "Installing Python packages from requirements.txt..."
        ./venv/bin/python -m pip install -r requirements.txt
