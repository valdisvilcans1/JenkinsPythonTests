name: build
description: Install python dependencies

inputs:
  repo-path:
    required: true
    description: Directory for python greetings

runs:
  using: composite
  steps:
    - name: Checkout python-greetings repository
      uses: actions/checkout@v6
      with:
        repository: mtararujs/python-greetings
        path: ${{ inputs.repo-path }}

    - name: Cache Python environment
      uses: actions/cache@v3
      with:
        path: ${{ inputs.repo-path }}/venv
        key: ${{ runner.os }}-venv-${{ hashFiles(format('{0}/requirements.txt', inputs.repo-path)) }}
        restore-keys: |
          ${{ runner.os }}-venv-

    - name: Create environment
      shell: cmd
      working-directory: ${{ inputs.repo-path }}
      run: |
        echo Creating environment..
        py -m venv venv

    - name: Show repository files
      shell: cmd
      run: dir

    - name: Install dependencies
      shell: cmd
      working-directory: ${{ inputs.repo-path }}
      run: |
        echo Installing dependencies..
        venv\\Scripts\\python.exe -m pip install -r requirements.txt